name: Test Harness - SonarQube Analysis

on:
  workflow_call:
    inputs:
      gitRef:
        description: Branch name or commit SHA
        required: false
        default: main
        type: string
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  run-code-quality-and-security-analysis:
    name: Run code quality and security analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./test-harness
    steps:
      - name: Check out repository code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.gitRef }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: test-harness/.nvmrc
          cache: npm
          cache-dependency-path: test-harness/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate coverage report
        run: npm run test:unit

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: ./test-harness

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 15
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: test-harness/.scannerwork/report-task.txt