name: Test Harness - Nightly Quality Analysis & Docker Image Vulnerability Scan

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-sonarqube-scan:
    name: Run SonarQube Scan
    permissions:
      contents: read
    uses: ./.github/workflows/test-harness-sonarqube.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
