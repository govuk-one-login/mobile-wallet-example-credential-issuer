services:
  floci:
    container_name: floci_documentBuilder
    image: floci/floci:1.5.27-compat
    ports:
      - "4561:4566"
    environment:
      - SERVICES=s3,dynamodb,kms
      - AWS_ACCESS_KEY_ID=na
      - AWS_SECRET_ACCESS_KEY=na
      - AWS_DEFAULT_REGION=eu-west-2
    volumes:
      - ./localAws/provision.sh:/etc/floci/init/ready.d/provision.sh

  kms:
    container_name: local_kms_documentBuilder
    image: nsmithuk/local-kms
    ports:
      - "4564:8080"
    environment:
      - KMS_ACCOUNT_ID=000000000000
      - KMS_REGION=eu-west-2
      - KMS_SEED_PATH=/init/seed.yaml
    volumes:
      - ./localAws/seed.yaml:/init/seed.yaml