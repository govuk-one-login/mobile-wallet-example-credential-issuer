services:
  localstack:
    container_name: localstack
    image: localstack/localstack:4.14.0@sha256:3ebc37595918b8accb852f8048fef2aff047d465167edd655528065b07bc364a # Cannot be updated past 4.14.0 due to LocalStack's move to a paid-only license.
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,kms,s3
      - AWS_ACCESS_KEY_ID=na
      - AWS_SECRET_ACCESS_KEY=na
      - AWS_DEFAULT_REGION=eu-west-2
    volumes:
      - ../localstack/provision.sh:/etc/localstack/init/ready.d/provision.sh
  imposter:
    container_name: imposter-mock
    image: outofcoffee/imposter
    ports:
      - "8001:8080"
    volumes:
      - ./mocks/config:/opt/imposter/config
  cri:
    container_name: example-cri
    platform: linux/amd64
    build:
      context: ..
      dockerfile: ./Dockerfile
    environment:
      - AWS_ACCESS_KEY_ID=na
      - AWS_SECRET_ACCESS_KEY=na
      - AWS_REGION=eu-west-2
      - CREDENTIAL_STORE_URL=http://imposter-mock:8080
      - ENVIRONMENT=ci
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - ONE_LOGIN_AUTH_SERVER_URL=http://test-harness:3001
      - ONE_LOGIN_AUTH_SERVER_URLS=http://test-harness:3001
      - SELF_URL=http://example-cri:8080
      - STATUS_LIST_URL=http://imposter-mock:8080
    ports:
      - "8080:8080"
    depends_on:
      - localstack
      - imposter

networks:
  default:
    name: integration-tests
