  repos:
    - repo: https://github.com/compilerla/conventional-pre-commit
      rev: v3.4.0
      hooks:
        - id: conventional-pre-commit
          stages: [commit-msg]
          args: [feat, fix, chore, docs, style, refactor, test, build, ci, perf, revert]

    - repo: local
      hooks:
        - id: cri-spotless
          name: CRI - Java format check
          language: system
          entry: bash -c 'cd example-credential-issuer && ./gradlew spotlessCheck -q'
          files: ^example-credential-issuer/.*\.(java|md)$
          stages: [pre-commit]

        - id: cri-checkov
          name: CRI - Infrastructure static analysis
          language: system
          entry: bash -c 'cd example-credential-issuer && ./gradlew checkov'
          files: ^example-credential-issuer/deploy/template.yaml
          stages: [pre-commit]

        - id: cri-tests
          name: CRI - Gradle unit tests
          language: system
          entry: bash -c 'cd example-credential-issuer && ./gradlew test -q'
          files: ^example-credential-issuer/.*\.java$
          stages: [pre-push]

    - repo: local
      hooks:
        - id: dsc-eslint-ts
          name: DSC - ESLint linter
          language: system
          entry: bash -c 'cd document-signing-certificate-issuer && npm run lint'
          files: ^document-signing-certificate-issuer/.*\.(ts|md)$
          stages: [pre-commit]

        - id: dsc-prettier-ts
          name: DSC - Prettier format check
          language: system
          entry: bash -c 'cd document-signing-certificate-issuer && npm run format:check'
          files: ^document-signing-certificate-issuer/.*\.(ts|md|yaml)$
          stages: [pre-commit]

        - id: dsc-jest-tests
          name: DSC - Jest unit tests
          language: system
          entry: bash -c 'cd document-signing-certificate-issuer && npm run test'
          files: ^document-signing-certificate-issuer/.*\.ts$
          stages: [pre-push]

        - id: dsc-checkov
          name: DSC - Infrastructure static analysis
          language: system
          entry: bash -c 'cd document-signing-certificate-issuer && npm run checkov'
          files: ^document-signing-certificate-issuer/template.yaml
          stages: [pre-commit]

    - repo: local
      hooks:
        - id: doc-builder-eslint-ts
          name: Document Builder - ESLint linter
          language: system
          entry: bash -c 'cd document-builder && npm run lint'
          files: ^document-builder/.*\.(ts|md)$
          stages: [pre-commit]

        - id: doc-builder-prettier-ts
          name: Document Builder - Prettier format check
          language: system
          entry: bash -c 'cd document-builder && npm run format:check'
          files: ^document-builder/.*\.(ts|md|yaml)$
          stages: [pre-commit]

        - id: doc-builder-jest-tests
          name: Document Builder - Jest unit tests
          language: system
          entry: bash -c 'cd document-builder && npm run test'
          files: ^document-builder/.*\.ts$
          stages: [pre-push]

        - id: doc-builder-checkov
          name: Document Builder - Infrastructure static analysis
          language: system
          entry: bash -c 'cd document-builder && npm run checkov'
          files: ^document-builder/template.yaml
          stages: [pre-commit]

    - repo: local
      hooks:
        - id: platform-ca-eslint-ts
          name: Platform CA - ESLint linter
          language: system
          entry: bash -c 'cd platform-ca/utils && npm run lint'
          files: ^platform-ca/utils/.*\.ts$
          stages: [pre-commit]

        - id: platform-ca-prettier-ts
          name: Platform CA - Prettier format check
          language: system
          entry: bash -c 'cd platform-ca/utils && npm run format:check'
          files: ^platform-ca/utils/.*\.ts$
          stages: [pre-commit]

        - id: platform-ca-checkov
          name: Platform CA - Infrastructure static analysis
          language: system
          entry: bash -c 'cd platform-ca && checkov --file template.yaml'
          files: ^platform-ca/template.yaml
          stages: [pre-commit]

    - repo: local
      hooks:
        - id: test-harness-eslint-ts
          name: Test Harness - ESLint linter
          language: system
          entry: bash -c 'cd test-harness && npm run lint'
          files: ^test-harness/.*\.(ts|md)$
          stages: [pre-commit]

        - id: test-harness-prettier-ts
          name: Test Harness - Prettier format check
          language: system
          entry: bash -c 'cd test-harness && npm run format:check'
          files: ^test-harness/.*\.(ts|md|yaml)$
          stages: [pre-commit]

        - id: test-harness-jest-tests
          name: Test Harness - Jest unit tests
          language: system
          entry: bash -c 'cd test-harness && npm run test:unit'
          files: ^test-harness/.*\.ts$
          stages: [pre-push]

